{% extends 'quiz/base.html' %}

{% block title %}Performance - Quiz-IT{% endblock %}

{% block content %}
<div class="home-container">
    <div class="home-box">
        <div class="perf-menu-icon">
            <i data-lucide="bar-chart-3"></i>
        </div>
        <h1 class="welcome-title">Performance</h1>
        <p class="subtitle">Explore your quiz results and analytics</p>

        <a href="{% url 'my_scores' %}" class="btn-home">
            <i data-lucide="line-chart"></i>
            <span>View My Past Scores</span>
        </a>
        <a href="{% url 'leaderboard' %}" class="btn-home">
            <i data-lucide="trophy"></i>
            <span>View Leaderboard</span>
        </a>
        <a href="{% url 'distribution' %}" class="btn-home">
            <i data-lucide="pie-chart"></i>
            <span>View Score Distribution</span>
        </a>

        <a href="{% url 'home' %}" class="btn-secondary" style="margin-top: 20px;">
            <i data-lucide="arrow-left" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle; margin-right: 6px;"></i>
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
